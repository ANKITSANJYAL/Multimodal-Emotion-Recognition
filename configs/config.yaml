# ==========================================
# Affect-Diff: CVPR 2026 Configuration
# ==========================================

# Global Settings
experiment_name: "AffectDiff_Baseline_Joint_Training"
seed: 42

# ------------------------------------------
# Data Configuration
# ------------------------------------------
data:
  data_dir: "data"                     # Raw CMU-MOSEI .csd files location
  cache_dir: "data/cache"              # Where the pre-aligned PyTorch tensors go
  batch_size: 64                       # DeepMind standard for MOSEI stability
  num_workers: 8                       # Keep GPUs fed with data
  seq_len: 50                          # Standard temporal padding for MOSEI

# ------------------------------------------
# Model Architecture & Bottleneck
# ------------------------------------------
model:
  num_classes: 6                       # MOSEI emotions
  text_dim: 300                        # GloVe (increase to 768 for RoBERTa)
  audio_dim: 74                        # COVAREP acoustic features
  video_dim: 35                        # VisualFacet42 facial action units
  hidden_dim: 512                      # Increased capacity for SOTA push
  latent_dim: 512                      # Wider latent manifold for diffusion
  beta_kl: 1.0                         # Lower KL pressure to prioritize task accuracy
  lambda_diff: 1.0                     # Balance generative prior
  lambda_causal: 0.05                  # Allow more causal flow
  cfg_scale: 4.0                       # Stronger guidance for cleaner sampling

# ------------------------------------------
# Diffusion Generative Prior
# ------------------------------------------
diffusion:
  steps: 1000                          # Standard DDPM forward/reverse steps
  schedule: "cosine"                   # Preserves continuous affective latents better than linear

# ------------------------------------------
# Training & Optimization
# ------------------------------------------
trainer:
  epochs: 200
  lr: 2e-5                             # Slower LR for stable convergence at 80%+
  weight_decay: 1e-3                   # Stronger regularization for generalization
  devices: 2                           # Use 2 GPUs for DDP
  precision: 32                        # Full precision for maximum generative stability

# ------------------------------------------
# Evaluation & Inference
# ------------------------------------------
eval:
  checkpoint_path: "checkpoints/best.ckpt" # Path used when running eval.py
  dissonance_threshold: 0.4            # Threshold for flagging "hidden emotions" vs text
